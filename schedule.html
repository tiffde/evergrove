<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Evergrove Schedule</title>

<style>

body{
    margin:0;
    padding:20px;
    background:transparent;
    font-family:Georgia, serif;
}

.schedule{
    width:170px;
}

.time{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.box{
    width:72px;
    text-align:center;

    padding:8px 0;

    border-radius:8px;

    background:#D9C8A7;

    color:white;

    font-weight:bold;

    font-size:18px;
}

.inactive{

    background:white;

    border:2px solid #D9C8A7;

    color:#A88A5D;

}

.arrow{

    margin-left:10px;

    color:#A88A5D;

    font-size:16px;

}

</style>

</head>

<body>

<div class="schedule">

<div class="time">
<div class="box">09:30</div>
<div class="arrow">→</div>
</div>

<div class="time">
<div class="box inactive">10:00</div>
<div class="arrow">→</div>
</div>

<div class="time">
<div class="box inactive">11:00</div>
<div class="arrow">→</div>
</div>

<div class="time">
<div class="box">01:00</div>
<div class="arrow">→</div>
</div>

<div class="time">
<div class="box inactive">03:00</div>
<div class="arrow">→</div>
</div>

<div class="time">
<div class="box inactive">05:00</div>
<div class="arrow">→</div>
</div>

<div class="time">
<div class="box">07:00</div>
<div class="arrow">→</div>
</div>

</div>

</body>
</html>
