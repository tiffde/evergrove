<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evergrove Music</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f7efe1;
  font-family: "Times New Roman", Times, serif;
  color: #5f4b36;
}

* { box-sizing: border-box; }

.player {
  width: 340px;
  padding: 18px;
  background: #fff4df;
  border: 1px solid #d8c49b;
  border-radius: 22px;
  text-align: center;
}

.header {
  font-style: italic;
  font-size: 18px;
  margin-bottom: 10px;
}

.song {
  font-size: 26px;
  font-weight: bold;
}

.artist {
  font-size: 18px;
  color: #b77d6c;
  margin-top: 4px;
}

.line {
  width: 170px;
  border-top: 1px solid #d8c49b;
  margin: 12px auto;
}

.turntable {
  position: relative;
  height: 170px;
  margin-top: 8px;
}

.record {
  width: 145px;
  height: 145px;
  border-radius: 50%;
  margin: 0 auto;
  background:
    radial-gradient(circle, #e8b4a8 0 16%, #111 17% 60%, #222 61% 70%, #111 71%);
  border: 5px solid #3a2d25;
  animation: spin 8s linear infinite;
}

.label {
  position: absolute;
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #e8b4a8;
  top: 50px;
  left: 147px;
  border: 1px solid #c78f83;
}

.arm {
  position: absolute;
  width: 105px;
  height: 7px;
  background: #b28a4d;
  top: 38px;
  right: 46px;
  transform: rotate(30deg);
  transform-origin: right center;
  border-radius: 8px;
}

.needle {
  position: absolute;
  width: 16px;
  height: 18px;
  background: #d9a09a;
  top: 70px;
  right: 129px;
  border-radius: 3px;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 22px;
  font-size: 24px;
  margin: 8px 0 12px;
  color: #7b6243;
}

.spotify {
  display: inline-block;
  text-decoration: none;
  color: #5f4b36;
  background: #f7efe1;
  border: 1px solid #d8c49b;
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 16px;
}

.spotify:hover {
  background: #efe4d0;
}

.note {
  margin-top: 10px;
  font-size: 15px;
  font-style: italic;
  color: #8a6f4d;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="player">
  <div class="header">♪ now playing ♪</div>

  <div class="song">Euclid</div>
  <div class="artist">Sleep Token</div>

  <div class="line"></div>

  <div class="turntable">
    <div class="record"></div>
    <div class="label"></div>
    <div class="arm"></div>
    <div class="needle"></div>
  </div>

  <div class="controls">
    <span>⏮</span>
    <span>⏸</span>
    <span>⏭</span>
  </div>

  <a class="spotify" href="https://open.spotify.com/artist/2n2RSaZqBuUUukhbLlpnE6" target="_blank">
    open in spotify
  </a>

  <div class="note">change the song in the code</div>
</div>

</body>
</html>
