<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evergrove Reading Progress</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #f7f1e6;
  font-family: "Times New Roman", Times, serif;
  color: #4f442d;
}

* { box-sizing: border-box; }

body { padding: 14px; }

.widget {
  max-width: 420px;
  padding: 18px;
  background: #fffaf0;
  border: 1px solid rgba(143, 127, 84, .25);
  border-radius: 18px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.title {
  font-size: 24px;
  font-style: italic;
  margin-bottom: 14px;
}

.pages {
  font-size: 36px;
  margin-bottom: 2px;
}

.pages span {
  color: #8a7a53;
}

.label {
  font-size: 16px;
  font-style: italic;
  color: #7a6a49;
  margin-bottom: 18px;
}

.vine-wrap {
  position: relative;
  height: 46px;
  margin: 10px 0 16px;
}

.vine-line {
  position: absolute;
  left: 8%;
  right: 8%;
  top: 23px;
  height: 4px;
  background: #8a6b35;
  border-radius: 20px;
}

.vine-fill {
  position: absolute;
  left: 8%;
  top: 20px;
  height: 10px;
  width: 0%;
  max-width: 84%;
  border-radius: 20px;
  background:
    radial-gradient(ellipse at center, #6d8b45 0 45%, transparent 48%),
    linear-gradient(90deg, #5f7f3b, #7f9c55);
  background-size: 20px 12px, 100% 100%;
  transition: width .45s ease;
}

.book {
  position: absolute;
  top: 6px;
  left: calc(8% - 12px);
  font-size: 28px;
  transition: left .45s ease;
  transform-origin: center;
}

.book.flip {
  animation: pageFlip .5s ease;
}

@keyframes pageFlip {
  0% { transform: rotateY(0deg) scale(1); }
  50% { transform: rotateY(75deg) scale(1.06); }
  100% { transform: rotateY(0deg) scale(1); }
}

.percent {
  display: inline-block;
  padding: 5px 18px;
  border: 1px solid rgba(143, 127, 84, .25);
  border-radius: 20px;
  background: #eef2df;
  font-size: 17px;
  margin: 10px 0 16px;
}

.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
}

button {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(143, 127, 84, .32);
  background: #f7efe1;
  color: #4f5f2f;
  font-family: "Times New Roman", Times, serif;
  font-size: 26px;
  cursor: pointer;
}

button:hover {
  background: #efe4d0;
}

.page-input,
.total-input {
  width: 70px;
  padding: 6px;
  text-align: center;
  border: 1px solid rgba(143, 127, 84, .3);
  border-radius: 6px;
  background: #fffaf0;
  color: #4f442d;
  font-family: "Times New Roman", Times, serif;
  font-size: 22px;
}

.total-input {
  font-size: 18px;
  color: #7a6a49;
}

.slash {
  font-size: 22px;
  color: #8a7a53;
}

.footer {
  margin-top: 14px;
  font-size: 14px;
  font-style: italic;
  color: #7a6a49;
}

.leaf {
  position: absolute;
  top: -20px;
  color: #6f8f48;
  font-size: 18px;
  pointer-events: none;
  animation: leafFall 1.7s ease-in forwards;
}

@keyframes leafFall {
  0% {
    opacity: 0;
    transform: translateY(0) rotate(0deg);
  }
  15% {
    opacity: 1;
  }
  100% {
    opacity: 0;
    transform: translateY(170px) rotate(160deg);
  }
}
</style>
</head>

<body>

<div class="widget" id="widget">
  <div class="title">📖 A Story Unfolds</div>

  <div class="pages">
    <span id="currentDisplay">56</span>
    <span>/</span>
    <span id="totalDisplay">380</span>
  </div>

  <div class="label">pages</div>

  <div class="vine-wrap">
    <div class="vine-line"></div>
    <div class="vine-fill" id="vineFill"></div>
    <div class="book" id="book">📖</div>
  </div>

  <div class="percent" id="percentDisplay">14.7% complete</div>

  <div class="controls">
    <button onclick="changePage(-1)">−</button>

    <input class="page-input" id="currentInput" type="number" min="0">
    <span class="slash">/</span>
    <input class="total-input" id="totalInput" type="number" min="1">

    <button onclick="changePage(1)">+</button>
  </div>

  <div class="footer">Click + or − to update your page</div>
</div>

<script>
let reading = JSON.parse(localStorage.getItem("evergroveReadingProgress")) || {
  current: 56,
  total: 380
};

function save(){
  localStorage.setItem("evergroveReadingProgress", JSON.stringify(reading));
}

function clamp(){
  reading.total = Math.max(1, Number(reading.total) || 1);
  reading.current = Math.max(0, Math.min(Number(reading.current) || 0, reading.total));
}

function render(animate = false){
  clamp();

  const percent = reading.total === 0 ? 0 : (reading.current / reading.total) * 100;
  const safePercent = Math.min(100, Math.max(0, percent));

  document.getElementById("currentDisplay").textContent = reading.current;
  document.getElementById("totalDisplay").textContent = reading.total;
  document.getElementById("currentInput").value = reading.current;
  document.getElementById("totalInput").value = reading.total;
  document.getElementById("percentDisplay").textContent = `${safePercent.toFixed(1)}% complete`;

  document.getElementById("vineFill").style.width = (safePercent * .84) + "%";
  document.getElementById("book").style.left = `calc(8% + ${safePercent * .84}% - 12px)`;

  if(animate){
    flipBook();
    fallLeaves();
  }

  save();
}

function changePage(amount){
  const oldPage = reading.current;
  reading.current += amount;
  clamp();
  render(reading.current !== oldPage);
}

function flipBook(){
  const book = document.getElementById("book");
  book.classList.remove("flip");
  void book.offsetWidth;
  book.classList.add("flip");
}

function fallLeaves(){
  const widget = document.getElementById("widget");

  for(let i = 0; i < 5; i++){
    const leaf = document.createElement("div");
    leaf.className = "leaf";
    leaf.textContent = i % 2 === 0 ? "🍃" : "🌿";
    leaf.style.left = (18 + Math.random() * 64) + "%";
    leaf.style.animationDelay = (Math.random() * .25) + "s";
    widget.appendChild(leaf);

    setTimeout(()=>leaf.remove(), 1900);
  }
}

document.getElementById("currentInput").addEventListener("change", e=>{
  const oldPage = reading.current;
  reading.current = Number(e.target.value);
  clamp();
  render(reading.current !== oldPage);
});

document.getElementById("totalInput").addEventListener("change", e=>{
  reading.total = Number(e.target.value);
  clamp();
  render(false);
});

render();
</script>

</body>
</html>
