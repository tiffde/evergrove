<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evergrove Active Quests</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #e8f0eb;
  font-family: "Times New Roman", Times, serif;
  color: #5f4b36;
}

* { box-sizing: border-box; }

body { padding: 10px; }

.widget {
  width: 100%;
  max-width: 390px;
  background: #e8f0eb;
}

.xp-panel {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 12px;
  background: rgba(255, 250, 240, 0.45);
  border-radius: 14px;
  margin-bottom: 12px;
  position: relative;
  overflow: hidden;
}

.bottle-wrap {
  width: 78px;
  text-align: center;
  position: relative;
}

.bottle-body {
  position: relative;
  width: 54px;
  height: 78px;
  margin: 0 auto;
  border: 2px solid #c9aa82;
  border-radius: 26px 26px 15px 15px;
  background: rgba(255,255,255,0.62);
  overflow: hidden;
  box-shadow: inset 0 0 8px rgba(255,255,255,.9);
}

.bottle-body::before {
  content: "";
  position: absolute;
  top: 9px;
  left: 10px;
  width: 12px;
  height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,.45);
  z-index: 3;
}

.bottle-neck {
  width: 22px;
  height: 18px;
  margin: 0 auto -2px;
  border: 2px solid #c9aa82;
  border-bottom: none;
  background: rgba(255,255,255,0.72);
  border-radius: 7px 7px 2px 2px;
}

.bottle-cork {
  width: 24px;
  height: 10px;
  margin: 0 auto -1px;
  background: #d7b879;
  border: 1px solid #b8945f;
  border-radius: 5px 5px 2px 2px;
}

.bottle-bow {
  position: absolute;
  top: 22px;
  left: 53px;
  color: #d891a2;
  font-size: 13px;
  transform: rotate(-18deg);
}

.dust {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 0%;
  background:
    radial-gradient(circle, rgba(255,255,255,.95) 1px, transparent 2px),
    linear-gradient(180deg, #f7b8ca, #eaa2bb);
  background-size: 9px 9px, 100% 100%;
  transition: height .45s ease;
  animation: dustShimmer 3s linear infinite;
}

@keyframes dustShimmer {
  from { background-position: 0 0, 0 0; }
  to { background-position: 18px -18px, 0 0; }
}

.xp-info {
  flex: 1;
  text-align: center;
  min-width: 0;
}

.xp-title {
  font-style: italic;
  font-size: 16px;
  margin-bottom: 7px;
}

.progress {
  width: 100%;
  height: 18px;
  border: 1px solid #c9aa82;
  border-radius: 18px;
  background: #fffaf0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background:
    radial-gradient(circle, rgba(255,255,255,.95) 1px, transparent 2px),
    linear-gradient(90deg, #f6b2c8, #eaa2bb);
  background-size: 9px 9px, 100% 100%;
  transition: width .45s ease;
  animation: dustShimmer 3s linear infinite;
}

.xp-count {
  font-size: 23px;
  margin-top: 8px;
}

.quest-count {
  font-style: italic;
  font-size: 14px;
  color: #7b6243;
}

.divider {
  border-top: 1px solid rgba(95, 75, 54, 0.22);
  margin: 10px 0;
}

.row {
  display: grid;
  grid-template-columns: 16px 42px 64px 112px 22px;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
  position: relative;
}

.row.dragging { opacity: .45; }

.row.completed-row {
  opacity: .70;
}

.drag-handle {
  color: rgba(95,75,54,.20);
  cursor: grab;
  font-size: 16px;
  user-select: none;
}

.drag-handle:hover {
  color: rgba(95,75,54,.45);
}

.icon-select {
  width: 42px;
  border: none;
  background: transparent;
  color: #5f4b36;
  font-family: "Times New Roman", Times, serif;
  font-size: 15px;
  cursor: pointer;
  padding: 2px;
}

.time {
  width: 64px;
  padding: 5px;
  text-align: center;
  border: 1px solid #d8c49b;
  border-radius: 5px;
  background: #fffaf0;
  color: #7b6243;
  font-family: "Times New Roman", Times, serif;
  font-weight: bold;
  font-size: 14px;
}

.time.current {
  background: #e0bc77;
  color: white;
  box-shadow: 0 0 8px rgba(224,188,119,.75);
  animation: currentPulse 4s ease-in-out infinite;
}

@keyframes currentPulse {
  0%, 100% { box-shadow: 0 0 5px rgba(224,188,119,.45); }
  50% { box-shadow: 0 0 10px rgba(224,188,119,.9); }
}

.time.completed {
  background: #c8ad7f;
  color: white;
}

.task {
  width: 112px;
  border: none;
  background: transparent;
  color: #5f4b36;
  font-family: "Times New Roman", Times, serif;
  font-size: 15px;
}

.task.completed {
  font-style: italic;
  text-decoration: line-through;
  opacity: .62;
}

.completed-row .icon-select {
  opacity: .55;
}

.removeButton {
  width: 20px;
  height: 20px;
  padding: 0;
  border: none;
  border-radius: 50%;
  background: transparent;
  color: rgba(122, 98, 67, .42);
  font-size: 16px;
  cursor: pointer;
  position: relative;
  z-index: 5;
}

.removeButton:hover {
  color: #9b5b63;
  background: rgba(231,196,196,.28);
}

.addButton {
  margin-top: 8px;
  padding: 6px 12px;
  background: #f7efe1;
  border: 1px solid #d8c49b;
  color: #7b6243;
  border-radius: 5px;
  cursor: pointer;
  font-family: "Times New Roman", Times, serif;
  font-size: 15px;
}

.addButton:hover {
  background: #efe4d0;
}

.float-sparkle {
  position: absolute;
  color: #eaa2bb;
  font-size: 15px;
  pointer-events: none;
  animation: sparkleFloat 1.2s ease-out forwards;
}

@keyframes sparkleFloat {
  0% { opacity: 0; transform: translateY(0) scale(.8); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-58px) scale(1.35); }
}

.float-xp {
  position: absolute;
  right: 26px;
  color: #e78cae;
  font-size: 16px;
  font-weight: bold;
  text-shadow: 0 0 7px rgba(255,255,255,.9);
  pointer-events: none;
  animation: xpFloat .9s ease-out forwards;
}

@keyframes xpFloat {
  0% { opacity: 0; transform: translateY(8px); }
  20% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-26px); }
}

input:focus,
select:focus {
  outline: 1px solid #c8ad7f;
}
</style>
</head>

<body>

<div class="widget">
  <div class="xp-panel">
    <div class="bottle-wrap" id="bottleWrap">
      <div class="bottle-cork"></div>
      <div class="bottle-neck"></div>
      <div class="bottle-body">
        <div class="dust" id="bottleDust"></div>
      </div>
      <div class="bottle-bow">♡</div>
    </div>

    <div class="xp-info">
      <div class="xp-title" id="xpTitle">a tiny spark is waiting...</div>
      <div class="progress">
        <div class="progress-fill" id="xpBar"></div>
      </div>
      <div class="xp-count" id="xpCount">0 / 0 XP</div>
      <div class="quest-count" id="questCount">0 of 0 quests completed</div>
    </div>
  </div>

  <div class="divider"></div>
  <div id="schedule"></div>
  <button class="addButton" onclick="addRow()">+ Add Time</button>
</div>

<script>
const icons = [
  "✨","💻","🍵","📚","🧠","📝","📧","📞",
  "🎮","📺","🎬","🎵","🎨","🧶","🛁","🧴",
  "🪥","🍽️","🥗","☕","💧","🏊","🚶","🏃",
  "🧘","🌿","🪴","🛒","🧺","🧹","🛏️","🌙",
  "❤️","🐈","🚗","🎁","⭐","🍲","🌅"
];

const XP_PER_QUEST = 10;

let schedule = JSON.parse(localStorage.getItem("evergroveSchedule")) || [
  { icon:"🌅", time:"09:30", task:"Wake Up", completed:false },
  { icon:"💻", time:"10:00", task:"Work", completed:false },
  { icon:"🧠", time:"11:00", task:"Focus Block", completed:false },
  { icon:"🍽️", time:"01:00", task:"Lunch", completed:false },
  { icon:"🌿", time:"03:00", task:"Reset", completed:false },
  { icon:"🚶", time:"05:00", task:"Walk", completed:false },
  { icon:"🍲", time:"07:00", task:"Dinner", completed:false }
];

function normalizeOldRows(){
  schedule = schedule.map(item => ({
    icon: item.icon || "✨",
    time: item.time || "00:00",
    task: item.task || "New Task",
    completed: item.completed || false
  }));
}

function save(){
  localStorage.setItem("evergroveSchedule", JSON.stringify(schedule));
}

function formatTime(value){
  let raw = value.toLowerCase().replace(/\s/g,"");
  let isPM = raw.includes("p");
  let isAM = raw.includes("a");

  raw = raw.replace(/[^\d]/g,"");

  if(raw.length === 0) return "00:00";

  let hour, min;

  if(raw.length <= 2){
    hour = parseInt(raw);
    min = 0;
  } else {
    hour = parseInt(raw.slice(0, raw.length - 2));
    min = parseInt(raw.slice(-2));
  }

  if(isPM && hour < 12) hour += 12;
  if(isAM && hour === 12) hour = 0;

  hour = Math.max(0, Math.min(23, hour));
  min = Math.max(0, Math.min(59, min));

  return String(hour).padStart(2,"0") + ":" + String(min).padStart(2,"0");
}

function timeToMinutes(time){
  const [h,m] = time.split(":").map(Number);
  return h * 60 + m;
}

function getCurrentIndex(){
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  let currentIndex = -1;

  schedule.forEach((item,index)=>{
    if(timeToMinutes(item.time) <= currentMinutes){
      currentIndex = index;
    }
  });

  return currentIndex;
}

function triggerSparkles(){
  const bottleWrap = document.getElementById("bottleWrap");

  for(let i = 0; i < 8; i++){
    const sparkle = document.createElement("div");
    sparkle.className = "float-sparkle";
    sparkle.textContent = i % 2 === 0 ? "✦" : "✧";
    sparkle.style.left = (15 + Math.random() * 52) + "px";
    sparkle.style.bottom = (34 + Math.random() * 28) + "px";
    sparkle.style.animationDelay = (Math.random() * .18) + "s";
    bottleWrap.appendChild(sparkle);

    setTimeout(()=>sparkle.remove(), 1400);
  }
}

function triggerFloatingXP(row){
  const xp = document.createElement("div");
  xp.className = "float-xp";
  xp.textContent = "+10 XP";
  row.appendChild(xp);
  setTimeout(()=>xp.remove(), 1000);
}

function updateXP(){
  const totalQuests = schedule.length;
  const completedQuests = schedule.filter(item=>item.completed).length;
  const totalXP = totalQuests * XP_PER_QUEST;
  const earnedXP = completedQuests * XP_PER_QUEST;
  const percent = totalXP === 0 ? 0 : Math.min(100, (earnedXP / totalXP) * 100);

  document.getElementById("xpBar").style.width = percent + "%";
  document.getElementById("bottleDust").style.height = percent + "%";
  document.getElementById("xpCount").textContent = `${earnedXP} / ${totalXP} XP`;
  document.getElementById("questCount").textContent = `${completedQuests} of ${totalQuests} quests completed`;

  const title = document.getElementById("xpTitle");

  if(percent === 0){
    title.textContent = "a tiny spark is waiting...";
  } else if(percent >= 100){
    title.textContent = "the bottle sparkles with magic.";
  } else {
    title.textContent = "fairy dust is growing...";
  }
}

function render(){
  normalizeOldRows();

  const container = document.getElementById("schedule");
  container.innerHTML = "";

  const currentIndex = getCurrentIndex();

  schedule.forEach((item,index)=>{
    const row = document.createElement("div");
    row.className = "row" + (item.completed ? " completed-row" : "");
    row.draggable = true;

    row.ondragstart = e=>{
      if(e.target.classList.contains("removeButton")) return;
      row.classList.add("dragging");
      e.dataTransfer.setData("text/plain", index);
    };

    row.ondragend = ()=>{
      row.classList.remove("dragging");
    };

    row.ondragover = e=>{
      e.preventDefault();
    };

    row.ondrop = e=>{
      e.preventDefault();
      const fromIndex = Number(e.dataTransfer.getData("text/plain"));
      if(Number.isNaN(fromIndex)) return;

      const movedItem = schedule.splice(fromIndex,1)[0];
      schedule.splice(index,0,movedItem);
      save();
      render();
    };

    const drag = document.createElement("div");
    drag.className = "drag-handle";
    drag.textContent = "⠿";

    const icon = document.createElement("select");
    icon.className = "icon-select";

    icons.forEach(optionIcon=>{
      const option = document.createElement("option");
      option.value = optionIcon;
      option.textContent = optionIcon;
      if(optionIcon === item.icon) option.selected = true;
      icon.appendChild(option);
    });

    icon.onchange = e=>{
      schedule[index].icon = e.target.value;
      save();
      render();
    };

    const time = document.createElement("input");
    time.className = "time";
    if(index === currentIndex && !item.completed) time.classList.add("current");
    if(item.completed) time.classList.add("completed");
    time.value = item.time;

    time.onchange = e=>{
      schedule[index].time = formatTime(e.target.value);
      save();
      render();
    };

    time.ondblclick = ()=>{
      const wasCompleted = schedule[index].completed;
      schedule[index].completed = !schedule[index].completed;
      save();
      render();

      if(!wasCompleted){
        setTimeout(triggerSparkles, 80);
        setTimeout(()=>{
          const rows = document.querySelectorAll(".row");
          if(rows[index]) triggerFloatingXP(rows[index]);
        }, 100);
      }
    };

    const task = document.createElement("input");
    task.className = "task" + (item.completed ? " completed" : "");
    task.value = item.task;

    task.oninput = e=>{
      schedule[index].task = e.target.value;
      save();
    };

    const remove = document.createElement("button");
    remove.className = "removeButton";
    remove.innerHTML = "×";

    remove.addEventListener("mousedown", function(e){
      e.preventDefault();
      e.stopPropagation();
    });

    remove.addEventListener("click", function(e){
      e.preventDefault();
      e.stopPropagation();

      schedule.splice(index, 1);
      save();
      render();
    });

    row.appendChild(drag);
    row.appendChild(icon);
    row.appendChild(time);
    row.appendChild(task);
    row.appendChild(remove);

    container.appendChild(row);
  });

  updateXP();
  save();
}

function addRow(){
  schedule.push({
    icon:"✨",
    time:"00:00",
    task:"New Task",
    completed:false
  });

  save();
  render();
}

render();
</script>

</body>
</html>
