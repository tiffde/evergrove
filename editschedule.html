<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Evergrove Schedule</title>

<style>
html,
body{
    margin:0;
    padding:0;
    background:#e8f0eb;
    font-family:"Times New Roman", Times, serif;
    color:#5f4b36;
}

*{
    box-sizing:border-box;
}

body{
    padding:10px;
}

#schedule{
    background:transparent;
}

.row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:8px;
    background:transparent;
}

.icon{
    width:28px;
    padding:4px 2px;
    text-align:center;
    border:none;
    background:transparent;
    font-size:16px;
    font-family:"Times New Roman", Times, serif;
}

.time{
    width:68px;
    padding:5px 6px;
    text-align:center;
    border:1px solid #d8c49b;
    border-radius:4px;
    background:#fffaf0;
    color:#9a7b4f;
    font-family:"Times New Roman", Times, serif;
    font-size:14px;
    font-weight:bold;
}

.time.active{
    background:#c8ad7f;
    color:white;
}

.task{
    flex:1;
    border:none;
    background:transparent;
    color:#5f4b36;
    font-family:"Times New Roman", Times, serif;
    font-size:15px;
}

.icon:focus,
.task:focus,
.time:focus{
    outline:1px solid #c8ad7f;
}

button{
    margin-top:8px;
    padding:5px 10px;
    background:#f7efe1;
    border:1px solid #d8c49b;
    color:#7b6243;
    border-radius:4px;
    cursor:pointer;
    font-family:"Times New Roman", Times, serif;
    font-size:14px;
}

button:hover{
    background:#efe4d0;
}

.removeButton{
    margin-top:0;
    margin-left:auto;
    width:24px;
    height:24px;
    padding:0;
    border-radius:50%;
    background:#f7efe1;
    border:1px solid #d8c49b;
    color:#9a7b4f;
    font-size:13px;
    cursor:pointer;
    flex-shrink:0;
}

.removeButton:hover{
    background:#e7c4c4;
    color:#7b2f2f;
}
</style>
</head>

<body>

<div id="schedule"></div>

<button onclick="addRow()">+ Add Time</button>

<script>
let schedule = JSON.parse(localStorage.getItem("evergroveSchedule")) || [
    { icon:"🌅", time:"09:30", task:"Wake Up", active:true },
    { icon:"💻", time:"10:00", task:"Work", active:false },
    { icon:"🧠", time:"11:00", task:"Focus Block", active:false },
    { icon:"🍽️", time:"01:00", task:"Lunch", active:true },
    { icon:"🌿", time:"03:00", task:"Reset", active:false },
    { icon:"🚶", time:"05:00", task:"Walk", active:false },
    { icon:"🍲", time:"07:00", task:"Dinner", active:true }
];

function normalizeOldRows(){
    schedule = schedule.map(item => ({
        icon: item.icon || "✨",
        time: item.time || "00:00",
        task: item.task || "New Task",
        active: item.active || false
    }));
}

function save(){
    localStorage.setItem("evergroveSchedule", JSON.stringify(schedule));
}

function render(){
    normalizeOldRows();

    const container = document.getElementById("schedule");
    container.innerHTML = "";

    schedule.forEach((item,index)=>{

        const row = document.createElement("div");
        row.className = "row";

        const icon = document.createElement("input");
        icon.className = "icon";
        icon.value = item.icon;
        icon.maxLength = 4;

        icon.oninput = e=>{
            schedule[index].icon = e.target.value;
            save();
        };

        const time = document.createElement("input");
        time.className = "time" + (item.active ? " active" : "");
        time.value = item.time;

        time.oninput = e=>{
            schedule[index].time = e.target.value;
            save();
        };

        time.ondblclick = ()=>{
            schedule[index].active = !schedule[index].active;
            save();
            render();
        };

        const task = document.createElement("input");
        task.className = "task";
        task.value = item.task;

        task.oninput = e=>{
            schedule[index].task = e.target.value;
            save();
        };

        const remove = document.createElement("button");
        remove.className = "removeButton";
        remove.innerHTML = "✕";

        remove.onclick = ()=>{
            if(confirm("Remove this time block?")){
                schedule.splice(index,1);
                save();
                render();
            }
        };

        row.appendChild(icon);
        row.appendChild(time);
        row.appendChild(task);
        row.appendChild(remove);

        container.appendChild(row);
    });

    save();
}

function addRow(){
    schedule.push({
        icon:"✨",
        time:"00:00",
        task:"New Task",
        active:false
    });

    save();
    render();
}

render();
</script>

</body>
</html>
